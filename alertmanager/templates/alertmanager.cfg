{{ansible_managed|comment(decoration='#')}}

check process alertmanager matching "/usr/local/bin/alertmanager.*"
  start program = "/bin/systemctl start {{service_name_alertmanager}}"
  stop program = "/bin/systemctl stop {{service_name_alertmanager}}"
  if failed host 127.0.0.1 port 9093 type tcp with timeout 3 seconds for 3 cycles then alert
  if failed host 127.0.0.1 port 9094 type tcp with timeout 3 seconds for 3 cycles then alert
  if does not exist for 3 cycles then alert
