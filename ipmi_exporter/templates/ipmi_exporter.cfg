{{ansible_managed|comment(decoration='#')}}

check process ipmi_exporter matching "/usr/local/bin/ipmi_exporter.*"
  start program = "/bin/systemctl start {{service_name_ipmi_exporter}}"
  stop program = "/bin/systemctl stop {{service_name_ipmi_exporter}}"
  if failed host 127.0.0.1 port 9290 type tcp with timeout 3 seconds for 3 cycles then alert
  if does not exist for 3 cycles then alert
