{{ansible_managed|comment(decoration='#')}}

check process unbound with pidfile "/run/unbound.pid"
  start program = "/bin/systemctl start {{service_name_unbound}}"
  stop program = "/bin/systemctl stop {{service_name_unbound}}"
{% if not (unbound_interface == []) %}
{% for item in unbound_interface %}
  if failed host {{item.address}} port {% if not (item.port|default('53') == '') %}{{item.port|int(53)}}{% endif %} type tcp protocol dns with timeout 3 seconds for 3 cycles then alert
  if failed host {{item.address}} port {% if not (item.port|default('53') == '') %}{{item.port|int(53)}}{% endif %} type udp protocol dns with timeout 3 seconds for 3 cycles then alert
{% endfor %}
{% endif %}
  if does not exist for 3 cycles then alert
